version: '3.8'

services:
  db_weather:
    image: postgres:15
    environment:
      POSTGRES_USER: $DB_USER
      POSTGRES_PASSWORD: $DB_PASSWORD
      POSTGRES_DB: $POSTGRES_DB
    ports:
      - "5432:5432"
    volumes:
      - ./pg_data:/var/lib/postgresql/data

    # --- Healthcheck ---
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $DB_USER -d $POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

    # --- Self-Healing ---
    restart: always

  weather_app:
    build: .
    depends_on:
      db_weather:
        condition: service_healthy
    environment:
      DB_URL: postgresql://$DB_USER:$DB_PASSWORD@db_weather:5432/$POSTGRES_DB
    restart: on-failure